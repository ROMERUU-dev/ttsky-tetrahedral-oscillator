name: gds-viewer

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gds-viewer.yaml"
      - "tools/build_gds_viewer.py"
      - "gds/**/*.gds"
      - "info.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GDS renderer
        run: python -m pip install --upgrade gdstk

      - name: Build static viewer
        run: python tools/build_gds_viewer.py --out _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
